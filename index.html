<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin & Win $500!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #1a0533 0%, #0d001a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Floating sparkles */
    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: gold;
      animation: float var(--dur) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff6600;
      letter-spacing: 2px;
      text-align: center;
    }
    h1 span { color: #ffcc00; }

    /* Wheel wrapper */
    .wheel-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
    }

    /* Pointer / arrow */
    .pointer {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 36px solid #ffcc00;
      filter: drop-shadow(0 0 8px #ffcc00);
      z-index: 10;
    }

    canvas#wheel {
      border-radius: 50%;
      box-shadow:
        0 0 0 8px #3a0080,
        0 0 0 12px #ffcc00,
        0 0 40px #cc00ff,
        0 0 80px #6600cc;
      display: block;
    }

    /* Center cap */
    .center-cap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffcc00, #ff6600);
      border: 4px solid #fff;
      box-shadow: 0 0 20px #ffcc00;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      z-index: 10;
    }

    /* Spin button */
    #spinBtn {
      padding: 16px 56px;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 2px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6600, #ffcc00, #ff6600);
      background-size: 200% auto;
      color: #1a0533;
      box-shadow: 0 0 20px #ff6600, 0 4px 0 #aa4400;
      transition: transform 0.1s, box-shadow 0.1s;
      animation: pulse 2s ease-in-out infinite;
      text-transform: uppercase;
    }
    #spinBtn:hover { transform: scale(1.05); }
    #spinBtn:active { transform: scale(0.97); box-shadow: 0 0 10px #ff6600; }
    #spinBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px #ff6600, 0 4px 0 #aa4400; }
      50%       { box-shadow: 0 0 40px #ffcc00, 0 4px 0 #aa4400; }
    }

    /* Win overlay */
    #winOverlay {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    #winOverlay.show { display: flex; }

    @keyframes popIn {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .win-title {
      font-size: 3.5rem;
      font-weight: 900;
      color: #ffcc00;
      text-shadow: 0 0 30px #ffcc00, 0 0 60px #ff6600;
      text-align: center;
      animation: glow 1s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff6600; }
      to   { text-shadow: 0 0 40px #ffcc00, 0 0 80px #ff6600, 0 0 100px #ffcc00; }
    }

    .win-sub {
      font-size: 1.1rem;
      color: #ddd;
      text-align: center;
    }

    #claimBtn {
      display: inline-block;
      padding: 18px 60px;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-decoration: none;
      border-radius: 50px;
      color: #1a0533;
      background: linear-gradient(135deg, #00ff88, #00ccff, #00ff88);
      background-size: 200% auto;
      box-shadow: 0 0 30px #00ff88, 0 4px 0 #009944;
      animation: shimmer 2s linear infinite, claimPulse 1s ease-in-out infinite;
      transition: transform 0.1s;
      text-transform: uppercase;
    }
    #claimBtn:hover { transform: scale(1.07); }
    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    @keyframes claimPulse {
      0%, 100% { box-shadow: 0 0 30px #00ff88, 0 4px 0 #009944; }
      50%       { box-shadow: 0 0 60px #00ccff, 0 4px 0 #009944; }
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 14px;
      top: -20px;
      opacity: 0;
      animation: confettiFall var(--fall-dur) ease-in var(--delay) forwards;
      z-index: 100;
      border-radius: 2px;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="sparkles" id="sparkles"></div>

<div class="container" id="mainView">
  <h1>🎰 SPIN TO WIN <span>$500</span>!</h1>

  <div class="wheel-wrapper">
    <div class="pointer"></div>
    <canvas id="wheel" width="320" height="320"></canvas>
    <div class="center-cap">🎯</div>
  </div>

  <button id="spinBtn" onclick="startSpin()">SPIN NOW!</button>
</div>

<div id="winOverlay">
  <div class="win-title">🎉 YOU WON $500! 🎉</div>
  <div class="win-sub">Congratulations! Click below to claim your prize.</div>
  <a id="claimBtn" href="https://smrturl.co/a/s20916c67b3/20132?s1=" target="_blank" rel="noopener">💰 CLAIM $500 NOW!</a>
</div>

<script>
  // ── Sparkles ──────────────────────────────────────────────
  const sparklesEl = document.getElementById('sparkles');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.setProperty('--dur', (3 + Math.random() * 5) + 's');
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDelay = (Math.random() * 6) + 's';
    s.style.background = ['gold','#ff6','#fff','#0ff','#f0f'][Math.floor(Math.random()*5)];
    sparklesEl.appendChild(s);
  }

  // ── Wheel drawing ─────────────────────────────────────────
  const canvas = document.getElementById('wheel');
  const ctx    = canvas.getContext('2d');
  const cx = canvas.width  / 2;
  const cy = canvas.height / 2;
  const R  = cx - 4;

  const segments = [
    { label: '$10',   color: '#6600cc' },
    { label: '$500',  color: '#ff6600' },   // ← winning segment (index 1)
    { label: '$50',   color: '#cc0066' },
    { label: 'TRY',   color: '#0066cc' },
    { label: '$100',  color: '#009933' },
    { label: '$25',   color: '#990000' },
    { label: '$200',  color: '#cc6600' },
    { label: 'LUCK',  color: '#336699' },
  ];

  const N     = segments.length;
  const slice = (2 * Math.PI) / N;

  function drawWheel(angle) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    segments.forEach((seg, i) => {
      const start = angle + i * slice;
      const end   = start + slice;

      // Slice
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, R, start, end);
      ctx.closePath();
      ctx.fillStyle = seg.color;
      ctx.fill();

      // Border
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Label
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(start + slice / 2);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 15px Segoe UI';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 6;
      ctx.fillText(seg.label, R - 10, 6);
      ctx.restore();
    });

    // Outer ring
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, 2 * Math.PI);
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  // ── Spin logic ────────────────────────────────────────────
  let currentAngle = 0;
  drawWheel(currentAngle);

  const WIN_SEGMENT = 1; // index of the $500 slice

  function startSpin() {
    const btn = document.getElementById('spinBtn');
    btn.disabled = true;

    // We want the winning segment (index 1) under the pointer (top = -Math.PI/2).
    // Pointer is at -PI/2. Centre of winning slice after rotation:
    //   currentAngle + WIN_SEGMENT*slice + slice/2  ≡  -PI/2  (mod 2PI)
    // Solve for delta:
    const targetAngle = -Math.PI / 2 - (WIN_SEGMENT * slice + slice / 2);
    const extra = Math.PI * 2 * (5 + Math.floor(Math.random() * 3)); // 5-7 full spins
    const delta = ((targetAngle - currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) + extra;

    const duration = 4500; // ms
    const start    = performance.now();
    const startA   = currentAngle;

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function tick(now) {
      const elapsed = now - start;
      const t = Math.min(elapsed / duration, 1);
      currentAngle = startA + delta * easeOut(t);
      drawWheel(currentAngle);

      if (t < 1) {
        requestAnimationFrame(tick);
      } else {
        currentAngle = startA + delta;
        drawWheel(currentAngle);
        showWin();
      }
    }
    requestAnimationFrame(tick);
  }

  // ── Win screen ────────────────────────────────────────────
  function showWin() {
    setTimeout(() => {
      document.getElementById('mainView').style.display  = 'none';
      const ov = document.getElementById('winOverlay');
      ov.classList.add('show');
      launchConfetti();
    }, 600);
  }

  function launchConfetti() {
    const colors = ['#ffcc00','#ff6600','#00ff88','#00ccff','#ff00cc','#fff'];
    for (let i = 0; i < 120; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.setProperty('--fall-dur', (2 + Math.random() * 3) + 's');
      p.style.setProperty('--delay',    (Math.random() * 2) + 's');
      p.style.left = Math.random() * 100 + 'vw';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(p);
    }
  }
</script>
</body>
</html>
