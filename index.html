<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fawa News – Watch Now</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #161a20;
      --border: rgba(255,255,255,0.08);
      --accent: #00c97a;
      --accent-dim: rgba(0, 201, 122, 0.12);
      --text: #f0f0ee;
      --muted: #7a7e85;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 0;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,201,122,0.12) 0%, transparent 70%);
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem 2rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .pl-banner {
      width: 100%;
      height: 180px;
      border-radius: 14px;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #1a0a2e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pl-banner img {
      height: 110px;
      width: auto;
      object-fit: contain;
    }

    .badge {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 1.25rem;
      border: 1px solid rgba(0,201,122,0.2);
    }

    .countdown {
      display: inline-block;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      padding: 3px 12px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }

    h1 span { color: var(--accent); }

    p.subtitle {
      font-size: 0.93rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--accent);
      color: #021a0e;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.95rem 2rem;
      border-radius: 14px;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
      width: 100%;
    }

    .cta:hover { opacity: 0.9; transform: translateY(-1px); }
    .cta:active { transform: scale(0.98); }

    .footer-note {
      margin-top: 1.25rem;
      font-size: 12px;
      color: var(--muted);
    }

    .footer-note a {
      color: var(--muted);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">

    <div class="pl-banner">
      <img
        src="https://logos-world.net/wp-content/uploads/2023/02/Premier-League-Emblem.png"
        alt="Premier League"
      />
    </div>

    <div class="badge">⚽ Premier League Live</div>
    <div class="countdown" id="countdown">Redirecting in 1s...</div>

    <h1>Fawa <span>News</span></h1>
    <p class="subtitle">Watch live Premier League matches and breaking football news — all in one app.</p>

    <a class="cta" href="https://play.google.com/store/apps/details?id=com.live.fawanews" id="storeLink">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
      Continue to Watch
    </a>

    <p class="footer-note">
      Opens Google Play Store &nbsp;·&nbsp;
      <a href="https://play.google.com/store/apps/details?id=com.live.fawanews">open manually</a>
    </p>
  </div>

  <script>
    window.addEventListener('load', () => {
      const ua = navigator.userAgent || '';
      const isAndroid = /android/i.test(ua);
      const webLink = 'https://play.google.com/store/apps/details?id=com.live.fawanews';
      const marketLink = 'market://details?id=com.live.fawanews';
      const intentLink = 'intent://details?id=com.live.fawanews#Intent;scheme=market;package=com.android.vending;end';

      const go = () => {
        if (isAndroid) { window.location.href = intentLink;  } else { window.location.href = webLink; }
      };

      setTimeout(go, 1000);

      setTimeout(() => {
        const el = document.getElementById('countdown');
        if (el) el.textContent = 'Opening app...';
      }, 900);

      document.getElementById('storeLink').addEventListener('click', (e) => {
        e.preventDefault();
        go();
      });
    });
  </script>
</body>
</html>
