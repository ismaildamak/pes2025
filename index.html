<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fawa News – Download Now</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #161a20;
      --border: rgba(255,255,255,0.08);
      --accent: #00c97a;
      --accent-dim: rgba(0, 201, 122, 0.12);
      --text: #f0f0ee;
      --muted: #7a7e85;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* background grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 0;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,201,122,0.12) 0%, transparent 70%);
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(0,201,122,0.2);
    }

    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #1e3a2f, #0b241a);
      border: 1px solid rgba(0,201,122,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 36px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }

    h1 span { color: var(--accent); }

    p.subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--accent);
      color: #021a0e;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.95rem 2rem;
      border-radius: 14px;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
      width: 100%;
    }

    .cta:hover { opacity: 0.9; transform: translateY(-1px); }
    .cta:active { transform: scale(0.98); }

    .cta svg { flex-shrink: 0; }

    .footer-note {
      margin-top: 1.25rem;
      font-size: 12px;
      color: var(--muted);
    }

    .footer-note a {
      color: var(--muted);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="badge">Android App</div>
    <div class="app-icon">📰</div>
    <h1>Fawa <span>News</span></h1>
    <p class="subtitle">Stay informed with the latest news. Download the app now and never miss a story.</p>

    <a class="cta" href="https://play.google.com/store/apps/details?id=com.live.fawanews" id="storeLink">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M3.18 23.76c.37.21.8.22 1.19.03l12.17-6.96-2.66-2.67L3.18 23.76z"/>
        <path d="M22.33 10.46l-2.77-1.59-2.97 2.97 2.97 2.97 2.8-1.6c.8-.46.8-1.29-.03-1.75z"/>
        <path d="M1.04.73C.69 1.1.5 1.65.5 2.35v19.3c0 .7.19 1.25.55 1.62l.09.08 10.81-10.8v-.25L1.04.73z"/>
        <path d="M16.54 7.72L4.37.76C3.98.57 3.55.58 3.18.79l10.7 10.7 2.66-2.67-.09-.1z"/>
      </svg>
      Watch Now
    </a>

    <p class="footer-note">
      Opens Google Play Store &nbsp;·&nbsp;
      <a href="https://play.google.com/store/apps/details?id=com.live.fawanews">open manually</a>
    </p>
  </div>

  <script>
    // Try to open native Play Store app on Android, fall back to browser
    window.addEventListener('load', () => {
      const ua = navigator.userAgent || '';
      const isAndroid = /android/i.test(ua);

      if (isAndroid) {
        // Try market:// deep link first (opens Play Store app directly)
        const marketLink = 'market://details?id=com.live.fawanews';
        const webLink = 'https://play.google.com/store/apps/details?id=com.live.fawanews';

        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        // Attempt native deep link
        iframe.src = marketLink;

        // Fallback to browser after a short delay
        setTimeout(() => {
          window.location.href = webLink;
        }, 1500);
      }

      // Update the CTA to use market:// on Android
      const link = document.getElementById('storeLink');
      if (isAndroid) {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.href = 'market://details?id=com.live.fawanews';
          setTimeout(() => {
            window.location.href = 'https://play.google.com/store/apps/details?id=com.live.fawanews';
          }, 1500);
        });
      }
    });
  </script>
</body>
</html>
